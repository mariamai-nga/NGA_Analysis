<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chart.js/3.7.0/chart.min.css">\n    <title>Student Assessment Dashboard</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }\n        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }\n        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }\n        th { background-color: #f4f4f4; }\n    </style>\n</head>\n<body>\n    <h1>Student Assessment Dashboard</h1>\n    <input type="file" id="csvFileInput" accept=".csv">\n    <button id="uploadBtn">Upload CSV</button>\n    <div id="analytics">\n        <canvas id="averagePerformanceChart"></canvas>\n        <canvas id="subjectWiseChart"></canvas>\n    </div>\n    <script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/3.7.0/chart.min.js"></script>\n    <script>\n        let studentData = [];\n        const uploadBtn = document.getElementById('uploadBtn');\n        uploadBtn.addEventListener('click', () => {\n            const fileInput = document.getElementById('csvFileInput');\n            const file = fileInput.files[0];\n            const reader = new FileReader();\n            reader.onload = function(event) {\n                const text = event.target.result;\n                parseCSV(text);\n            };\n            if (file) {\n                reader.readAsText(file);\n            }\n        });\n        function parseCSV(text) {\n            const rows = text.split('\n');\n            rows.forEach(row => {\n                const cols = row.split(',');\n                if (cols.length > 1) {\n                    studentData.push({ name: cols[0], score: parseFloat(cols[1]), subject: cols[2] });\n                }\n            });\n            calculateAnalytics();\n        }\n        function calculateAnalytics() {\n            const totalScores = {};\n            const subjectCounts = {};\n            studentData.forEach(data => {\n                if (!totalScores[data.subject]) { totalScores[data.subject] = 0; subjectCounts[data.subject] = 0; }\n                totalScores[data.subject] += data.score;\n                subjectCounts[data.subject]++;\n            });\n            drawCharts(totalScores, subjectCounts);\n        }\n        function drawCharts(totalScores, subjectCounts) {\n            const averagePerformance = Object.keys(totalScores).map(subject => ({\n                subject: subject,\n                average: totalScores[subject] / subjectCounts[subject] \n            }));\n            const ctx1 = document.getElementById('averagePerformanceChart').getContext('2d');\n            new Chart(ctx1, {\n                type: 'bar',\n                data: {\n                    labels: averagePerformance.map(item => item.subject),\n                    datasets: [{ label: 'Average Score', data: averagePerformance.map(item => item.average), backgroundColor: 'rgba(75, 192, 192, 0.2)', borderColor: 'rgba(75, 192, 192, 1)', borderWidth: 1 }]\n                },\n                options: { scales: { y: { beginAtZero: true } } }\n            });\n            const ctx2 = document.getElementById('subjectWiseChart').getContext('2d');\n            new Chart(ctx2, {\n                type: 'doughnut',\n                data: {\n                    labels: Object.keys(totalScores),\n                    datasets: [{ label: 'Scores per Subject', data: Object.values(totalScores), backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56'] }]\n                },\n                options: {}\n            });\n        }\n    <\/script>\n</body>\n</html>
